<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' braidr-img:; connect-src 'self' https://us.i.posthog.com">
    <title>Braidr</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #ffffff;
        color: #1a1a1a;
        overflow: hidden;
      }
      #root {
        height: 100vh;
        width: 100vw;
      }
      /* Capacitor iOS: push content below status bar */
      .mobile-safe-area-top {
        padding-top: 48px !important;
        box-sizing: border-box !important;
      }
      .mobile-safe-area-top .app-sidebar {
        padding-top: 8px !important;
      }
      /* iPad layout fixes — ensure every container in the chain has
         a fixed height so overflow-y: auto works on iOS */
      .mobile-safe-area-top {
        height: 100vh !important;
        overflow: hidden !important;
      }
      .mobile-safe-area-top .app-sidebar {
        top: 48px !important;
        height: calc(100vh - 48px) !important;
      }
      .mobile-safe-area-top .app-body {
        height: calc(100vh - 48px) !important;
        padding-top: 0 !important;
        overflow: hidden !important;
      }
      /* Editor: all three panels need bounded height */
      .mobile-safe-area-top .editor-view {
        height: 100% !important;
        max-height: 100% !important;
      }
      .mobile-safe-area-top .editor-nav {
        overflow-y: auto !important;
        -webkit-overflow-scrolling: touch !important;
      }
      .mobile-safe-area-top .editor-meta {
        overflow-y: auto !important;
        -webkit-overflow-scrolling: touch !important;
      }
      .mobile-safe-area-top .main-content--editor {
        height: 100% !important;
        overflow: hidden !important;
      }
      /* POV: scrollable content */
      .mobile-safe-area-top .pov-layout {
        overflow-y: auto !important;
        -webkit-overflow-scrolling: touch !important;
        height: 100% !important;
      }
      .mobile-safe-area-top .pov-content {
        max-width: none !important;
        padding-bottom: 120px !important;
      }
      /* Notes: scrollable panels */
      .mobile-safe-area-top .notes-view {
        height: 100% !important;
      }
      .mobile-safe-area-top .main-content--notes {
        height: 100% !important;
        overflow: hidden !important;
      }
      /* Rails: scrollable */
      .mobile-safe-area-top .rails-view {
        height: 100% !important;
        overflow: auto !important;
        -webkit-overflow-scrolling: touch !important;
      }

      /* Full-width view layout — nuclear override to eliminate gaps.
         These rules use !important to guarantee they win over any
         class-based or bundled CSS that might add padding/margins. */
      .main-content--editor,
      .main-content--braided,
      .main-content--notes {
        flex: 1 !important;
        display: flex !important;
        flex-direction: column !important;
        padding: 0 !important;
        overflow: hidden !important;
      }
      .scene-list--editor,
      .scene-list--braided,
      .scene-list--notes {
        flex: 1 !important;
        display: flex !important;
        flex-direction: column !important;
        padding: 0 !important;
        margin: 0 !important;
        max-width: none !important;
        min-height: 0 !important;
      }
      .editor-view,
      .pov-layout,
      .braided-layout {
        display: flex !important;
        flex: 1 !important;
        height: 100% !important;
        min-height: 0 !important;
        width: 100% !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/renderer/main.tsx"></script>
  </body>
</html>
